<link rel="stylesheet" href="templaces/css/tao_video.css">

<div class="page-heading">
    <div class="page-heading-left">
        <img class="panel-icon" src="/ico/video.png" alt="">
        <h2>Tạo Video</h2>
    </div>
    <div style="display: flex; flex-direction: row; gap: 8px; flex: 1; justify-content: flex-end; align-items: center;">
        <span class="label">Tỉ lệ</span>
        <select id="aspect_ratio" class="input-control">
            <option selected>9:16</option>
            <option>16:9</option>
            <option>1:1</option>
            <option>3:2</option>
            <option>2:3</option>
        </select>
    </div>
    <div class="header-actions">
        <button id="btn-add-video" class="btn-header">Thêm</button>
        <button id="btn-start-video" class="btn-header">Bắt đầu</button>
        <button id="btn-save-video" class="btn-header">Lưu</button>
    </div>
</div>

<div class="video-gen-wrapper">
    <div id="video-display-area" class="display-workspace">
    </div>
</div>
