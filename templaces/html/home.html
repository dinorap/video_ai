<div class="home-dashboard">
    <section class="group-box theme-panel">
        <div class="panel-heading">
            <img class="panel-icon" src="/ico/settings.png" alt="">
            <h2>CHỌN GIAO DIỆN (THEME)</h2>
        </div>
        <div id="themeGrid" class="theme-grid"></div>
    </section>

    <section class="group-box cdp-panel">
        <div class="panel-heading">
            <img class="panel-icon" src="/ico/setting-lines.png" alt="">
            <h2>CÀI ĐẶT CDP</h2>
        </div>
        <div class="cdp-row">
            <label for="cdpPortInput">Port điều khiển</label>
            <input id="cdpPortInput" class="input-control" type="number" min="1" max="65535" step="1" value="9222" />
        </div>
    </section>

    <section class="group-box task-panel">
        <div class="task-title-row">
            <div class="panel-heading">
                <img class="panel-icon" src="/ico/musical.png" alt="">
                <h2>DANH SÁCH TÁC VỤ</h2>
            </div>
            <div class="task-actions">
                <button class="btn btn-clear" id="clearTasksBtn">
                    <i class="fas fa-trash-alt"></i> Clear
                </button>
            </div>
        </div>
        <div class="table-container">
            <table class="task-table">
                <thead>
                    <tr>
                        <th style="width: 50px;">STT</th>
                        <th>Dự Án</th>
                        <th>Model</th>
                        <th>Thời gian</th>
                        <th style="text-align: center; width: 120px;">Trạng thái</th>
                    </tr>
                </thead>
                <tbody id="taskTableBody"></tbody>
            </table>
        </div>
    </section>
</div>
