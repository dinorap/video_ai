<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Studio</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
    <link rel="shortcut icon" type="image/x-icon" href="/favicon.ico?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/templaces/css/style.css">
</head>

<body class="theme-default">

    <div id="startup-splash"
        style="position: fixed; inset: 0; background: transparent; display: flex; align-items: center; justify-content: center; z-index: 20000;">
        <img src="/ico/logo.ico" alt="logo" style="width: 140px; height: 140px; opacity: 0.95;" />
    </div>

    <div id="sidebar">
        <div class="logo">
            <div class="logo-main">AI Video Studio</div>
            <div class="app-version">Loading...</div>
        </div>

        <div class="info-card">
            <span class="label"><img class="section-icon" src="/ico/musical.png" alt=""> AI Credit Balance</span>
            <div class="value credit-value">1,250.00</div>
        </div>

        <div class="info-card">
            <span class="label"><img class="section-icon" src="/ico/user.png" alt=""> User ID</span>

            <div class="value id-value">

                <span id="userId" contenteditable="false" onclick="enableEdit()" style="cursor:text;">
                    Loading...
                </span>

                <!-- COPY -->
                <i class="fas fa-copy copy-btn" id="btn-copy" onclick="copyId(event)" title="Copy ID"
                    style="cursor:pointer;"></i>

                <!-- SAVE -->
                <i class="fas fa-save save-btn" id="btn-save" onclick="saveUserId(event)" title="Lưu ID"
                    style="display:none;cursor:pointer;color:#4CAF50;margin-left:5px;"></i>

            </div>
        </div>

        <div class="section-title"><img class="section-icon" src="/ico/people.png" alt=""> Quản lý tài khoản</div>
        <div class="group-box">
            <div>
                <span class="label">Model AI Đang dùng</span>
                <select class="input-control" id="model-select">
                    <option>Grok (X-AI)</option>
                    <option>Veo3 (Google)</option>
                    <!-- <option style="display: none;">Kling AI</option> -->
                </select>
            </div>
            <button class="btn btn-settings" id="btn-settings-account"><img class="btn-icon" src="/ico/settings.png" alt=""> THIẾT LẬP TÀI KHOẢN</button>
        </div>

        <div class="section-title"><img class="section-icon" src="/ico/setting-lines.png" alt=""> Cấu hình chạy</div>
        <div class="group-box" style="gap: 8px;">
            <div style="display: flex; flex-direction: row; gap: 8px;">
                <div style="flex: 1;">
                    <span class="label">Chất lượng</span>
                    <select class="input-control" id="video-quality-select">
                        <option selected>1080p</option>
                        <option>720p</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <span class="label">Tỉ lệ</span>
                    <select id="aspect_ratio" class="input-control">
                        <option selected>9:16</option>
                        <option>16:9</option>
                    </select>
                </div>
            </div>

            <div id="grok-duration-container" style="display: none;">
                <span class="label">Thời lượng video (Grok)</span>
                <select class="input-control" id="grok-video-duration">
                    <option value="6s" selected>6 giây</option>
                    <option value="10s">10 giây</option>
                </select>
            </div>

            <div>
                <span class="label">Số tab chạy song song</span>
                <input class="input-control" id="max-tabs-input" type="number" min="1" max="10" value="5" />
            </div>
        </div>

        <div class="section-title"><img class="section-icon" src="/ico/musical.png" alt=""> Âm thanh &amp; Xử lý</div>
        <div class="group-box">
            <div>
                <span class="label">Nhạc nền video</span>
                <input class="input-control" id="musicSelect" list="musicSelectList" placeholder="Gõ để tìm nhạc..." />
                <datalist id="musicSelectList">
                    <option value="None (Mặc định)"></option>
                    <option value="vibrant-fashion.mp3"></option>
                    <option value="cinematic-bgm.mp3"></option>
                </datalist>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                <button class="btn btn-gold" id="addMusicBtn" style="grid-column: span 2;">+ Thêm âm thanh</button>
                <button class="btn btn-preview"><i class="fas fa-play"></i> Nghe thử</button>
                <button class="btn btn-delete" onclick="deleteSelectedMusic()">
                    <i class="fas fa-trash-alt"></i> Xóa
                </button>
            </div>
            <label class="random-inline">
                <input id="random-music-checkbox" type="checkbox" checked>
                <span>Chế độ Random nhạc</span>
            </label>
        </div>
        <!-- input ẩn dùng để chọn file nhạc / video thêm mới -->
        <input id="addMusicInput" type="file" accept="audio/*,video/*" style="display:none;">

        <div class="section-title"><i class="fas fa-folder-open"></i> Thư mục lưu kết quả</div>
        <div class="group-box result-folder-box">
            <button id="resultFolderBtn" class="btn btn-folder" style="width: 100%;">
                <span class="folder-symbol">▣</span>
                <span id="resultFolderLabel">THƯ MỤC KẾT QUẢ</span>
            </button>
            <input id="resultFolderInput" type="file" webkitdirectory directory multiple style="display:none;">
        </div>
    </div>

    <div id="main-wrapper">
        <header>
            <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
                <div class="horizontal-tabs">
                    <div class="tab-item active"><img class="tab-icon" src="/ico/home.png" alt=""> Home</div>
                    <div class="tab-item"><img class="tab-icon" src="/ico/paste.png" alt=""> Clone Video</div>
                    <div class="tab-item"><img class="tab-icon" src="/ico/image.png" alt=""> Tạo Ảnh</div>
                    <div class="tab-item"><img class="tab-icon" src="/ico/video.png" alt=""> Tạo Video</div>
                </div>
                <button type="button" class="help-btn" id="helpGuideBtn" onclick="openHelpGuide()" title="Hướng dẫn sử dụng">
                    ?
                </button>
                <button class="btn" id="exitAppBtn">
                    <i class="fas fa-power-off"></i> Thoát
                </button>
            </div>
        </header>

        <div class="workspace" id="workspace-root"></div>
    </div>
    <div id="overlays-root"></div>
    <script src="/templaces/js/overlays.js"></script>
    <script src="/templaces/js/home.js"></script>
    <script src="/templaces/js/clone_video.js"></script>
    <script src="/templaces/js/tao_anh.js"></script>
    <script src="/templaces/js/tao_video.js"></script>
    <!-- <script src="/templaces/js/kling.js"></script> -->
    <script src="/templaces/js/core.js"></script>

    <script>
        function openHelpGuide() {
            const modal = document.getElementById('helpGuideModal');
            if (modal) {
                modal.style.display = 'flex';
            }
        }

        function closeHelpGuide() {
            const modal = document.getElementById('helpGuideModal');
            if (modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>

</html>
