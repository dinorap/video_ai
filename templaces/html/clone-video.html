<div class="clone-page">
    <div class="page-heading">
        <img class="panel-icon" src="/ico/paste.png" alt="">
        <h2>Clone Video</h2>
    </div>

    <div class="clone-grid">
        <section class="group-box clone-card clone-settings-card">
            <div class="panel-heading">
                <img class="panel-icon" src="/ico/setting-lines.png" alt="">
                <h2>Thiết lập</h2>
            </div>
            <div class="clone-form-grid">
                <button type="button" class="btn btn-settings" id="cloneVideoChooseBtn">Chọn video</button>
                <input type="text" class="input-control" id="cloneVideoPathInput" placeholder="Đường dẫn video..." />
                <input type="file" id="cloneVideoFileInput" accept="video/*" style="display:none;" />

                <label>Ngôn ngữ</label>
                <select class="input-control">
                    <option value="vietnam" selected>Việt Nam</option>
                    <option value="english">English</option>
                    <option value="chinese">中国</option>
                </select>

                <label>Loại sản phẩm</label>
                <select class="input-control">
                    <option value="thoitrang" selected>Thời trang</option>
                    <option value="bienso">Biển số xe</option>
                    <option value="simso">Sim số</option>
                </select>

                <label>Model</label>
                <select class="input-control" id="cloneVideoModelSelect">
                    <option value="gpt-4.1-mini">gpt-4.1-mini</option>
                    <option value="gemini-2.5-flash" selected>gemini-2.5-flash</option>
                    <option value="gemini-2.0-flash">gemini-2.0-flash</option>
                    <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite</option>
                    <option value="gemini-2.0-flash-lite">gemini-2.0-flash-lite</option>
                </select>

                <label>API Key</label>
                <input type="text" class="input-control" id="cloneVideoApiKey" value="" />

                <label>Kịch bản</label>
                <select id="scriptSelect" class="input-control">
                    <option value="" selected>None</option>
                </select>
            </div>
        </section>

        <section class="group-box clone-card clone-preview-card">
            <div class="panel-heading">
                <img class="panel-icon" src="/ico/video.png" alt="">
                <h2>Nội dung</h2>
            </div>
            <div id="cloneVideoPreview" class="clone-video-preview">
                <img id="cloneVideoPreviewThumb" alt="Video thumbnail" />
                <video id="cloneVideoPreviewVideo" muted playsinline></video>
                <div id="cloneVideoPlayIcon" class="clone-play-layer">
                    <div class="clone-play-button"><div></div></div>
                </div>
            </div>
        </section>

        <section class="group-box clone-card clone-action-card">
            <div class="panel-heading">
                <img class="panel-icon" src="/ico/settings.png" alt="">
                <h2>Hành động</h2>
            </div>
            <div class="clone-actions">
                <button type="button" class="btn btn-settings" id="startBtn">Bắt đầu</button>
                <button type="button" id="saveScriptBtn" class="btn btn-preview">Lưu kịch bản</button>
                <button type="button" id="deleteScriptBtn" class="btn btn-delete danger-btn">Xóa kịch bản</button>
            </div>
        </section>

        <section class="group-box clone-card clone-script-card">
            <div class="clone-script-title">
                <div class="panel-heading">
                    <img class="panel-icon" src="/ico/paste.png" alt="">
                    <h2>Kịch bản</h2>
                </div>
                <button type="button" id="addSceneBtn" class="btn btn-settings compact-btn">Thêm</button>
            </div>
            <div id="sceneContainer" class="scene-container">
                <!-- Scenes will be rendered here -->
            </div>
        </section>
    </div>
</div>
